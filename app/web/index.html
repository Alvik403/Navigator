<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAX RASS</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #111827;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.12), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(124, 58, 237, 0.08), transparent 35%),
        var(--bg);
    }
    .shell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      padding: 36px 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 24px; color: var(--muted); line-height: 1.5; }
    .actions { display: grid; gap: 12px; }
    .btn {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border: 0;
      border-radius: 11px;
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    .btn-secondary {
      background: #f8fafc;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: #f1f5f9; }
    .status { margin-top: 20px; font-size: 14px; color: var(--muted); min-height: 20px; }
    .build-tag {
      margin: 16px 0 0;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
    .hidden { display: none; }

    .login-frame-shell {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.12), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(124, 58, 237, 0.08), transparent 35%),
        var(--bg);
    }

    .login-frame {
      display: block;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      border: 0;
      background: transparent;
    }

    .login-frame-status {
      margin: 0;
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .login-card { max-width: 430px; }
    .login-form {
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
    }
    .field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      outline: none;
    }
    .field input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }
    .demo-list {
      display: grid;
      gap: 8px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .demo-account {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .demo-account:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
    }
    .demo-account strong {
      font-size: 13px;
    }
    .demo-account span {
      color: var(--muted);
      font-size: 12px;
    }

    .max-card { max-width: 400px; }
    .max-wait { text-align: center; padding: 12px 0; }
    .max-icon {
      display: inline-grid;
      width: 56px;
      height: 56px;
      place-items: center;
      margin-bottom: 16px;
      border-radius: 16px;
      background: #f5f3ff;
      color: #7c3aed;
      font-size: 24px;
      font-weight: 800;
    }
    .max-wait h2 { margin: 0 0 8px; font-size: 22px; }
    .max-wait p { margin: 0 0 20px; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .timer {
      display: inline-block;
      margin-bottom: 20px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #f1f5f9;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .max-demo-actions { display: grid; gap: 10px; margin-bottom: 12px; }
    .btn-max {
      background: #f5f3ff;
      color: #7c3aed;
      border: 1px solid #ddd6fe;
      text-decoration: none;
    }
    .btn-max:hover { background: #ede9fe; }
    .back-link {
      display: inline-block;
      margin-top: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: 0;
      font-family: inherit;
    }
    .back-link:hover { text-decoration: underline; }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 16px;
      border: 3px solid #e2e8f0;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-card { max-width: 440px; }
    .auth-result { text-align: center; }
    .auth-result h1 { margin: 0 0 10px; font-size: 24px; }
    .auth-result > p { margin: 0 0 20px; color: var(--muted); font-size: 15px; line-height: 1.55; }
    .auth-icon {
      display: inline-grid;
      width: 56px;
      height: 56px;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 700;
    }
    .auth-icon-success { background: #ecfdf5; color: #059669; }
    .auth-icon-error { background: #fef2f2; color: #dc2626; }
    .alert {
      margin: 0 0 20px;
      padding: 14px 16px;
      border-radius: 12px;
      text-align: left;
      font-size: 14px;
      line-height: 1.55;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

    .db-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    .db-header,
    .db-panel {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    .db-header {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px;
      margin-bottom: 18px;
    }
    .db-header h1,
    .db-panel h2 {
      margin: 0 0 8px;
    }
    .db-header p {
      max-width: 720px;
      margin-bottom: 0;
    }
    .db-header-actions {
      display: flex;
      min-width: 220px;
      gap: 10px;
      flex-direction: column;
    }
    .db-grid {
      display: grid;
      grid-template-columns: minmax(240px, 0.8fr) minmax(0, 1.4fr);
      gap: 18px;
      margin-bottom: 18px;
    }
    .db-panel {
      padding: 22px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .db-samples {
      display: grid;
      gap: 10px;
    }
    .db-sample {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      color: var(--text);
      font: inherit;
      font-weight: 650;
      text-align: left;
      cursor: pointer;
    }
    .db-sample:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
    }
    #dbSql {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #0f172a;
      color: #e2e8f0;
      font: 13px/1.5 Consolas, "Courier New", monospace;
    }
    .db-form-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px;
      align-items: end;
      margin-top: 14px;
    }
    .db-form-row label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .db-form-row input {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 11px;
      font: inherit;
    }
    .db-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .db-result-header span,
    .db-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .muted-box {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      background: #f8fafc;
    }
    .db-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .db-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }
    .db-table th,
    .db-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    .db-table th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
    }
    .db-result pre {
      margin: 0;
      overflow-x: auto;
      white-space: pre-wrap;
      color: var(--text);
    }
    @media (max-width: 820px) {
      .db-header,
      .db-grid,
      .db-form-row {
        grid-template-columns: 1fr;
      }
      .db-header {
        display: block;
      }
      .db-header-actions {
        margin-top: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
